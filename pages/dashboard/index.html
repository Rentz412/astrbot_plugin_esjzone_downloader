<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESJZone 下载器 Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <h1>ESJZone 下载器 Dashboard</h1>
    <section class="token-panel">
      <label>Dashboard Token</label>
      <input id="token" type="password" placeholder="输入配置中的 dashboard.token" />
      <button id="saveToken">保存 Token</button>
      <button id="refresh">刷新书库</button>
    </section>
    <section id="status" class="status">正在初始化...</section>
    <section id="books" class="books"></section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
